[pytest]
# Pytest configuration for meeps test suite

# Test markers
markers =
    unit: Unit tests for individual components (fast)
    integration: Integration tests with mocked APIs (fast)
    slow: Tests that may take longer to run
    api: Tests that interact with external APIs (slow, requires network)

# Skip slow API tests by default
# Run with: pytest -m "not api" (default, fast)
# To run API tests: pytest -m api
# To run all tests: pytest -m "api or not api"
addopts = -m "not api" --tb=short -v

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
console_output_style = progress
